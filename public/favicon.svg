<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Aliança">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#D6A84A"/>
      <stop offset="1" stop-color="#C18E2A"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="#fff0"/>
  <!-- primeiro anel -->
  <g transform="translate(8,8)">
    <circle cx="20" cy="20" r="14" fill="none" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- segundo anel levemente sobreposto -->
  <g transform="translate(18,12)">
    <circle cx="20" cy="20" r="14" fill="none" stroke="#e7c776" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
